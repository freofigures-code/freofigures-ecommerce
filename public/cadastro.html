<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Criar Conta | FreoFigures</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800;900&family=Space+Grotesk:wght@300;400;600;700&display=swap" rel="stylesheet">

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            'freo-black': '#0A0A0A',
            'freo-dark': '#121212',
            'freo-light': '#F5F5F5',
            'freo-orange': '#DDAF34',
            'freo-cyan': '#2C3E50',
          },
          fontFamily: {
            display: ['Outfit', 'sans-serif'],
            body: ['Space Grotesk', 'sans-serif'],
            mono: ['ui-monospace', 'SFMono-Regular', 'Menlo', 'Monaco', 'Consolas', 'monospace'],
          }
        }
      }
    }
  </script>

  <style>
    /* ── Custom checkbox ── */
    .freo-checkbox {
      appearance: none;
      -webkit-appearance: none;
      width: 18px;
      height: 18px;
      min-width: 18px;
      border: 1.5px solid rgba(255,255,255,0.2);
      background: #0A0A0A;
      cursor: pointer;
      position: relative;
      transition: border-color 0.2s, background 0.2s;
      display: inline-block;
      vertical-align: middle;
      flex-shrink: 0;
    }
    .freo-checkbox:checked {
      background: #DDAF34;
      border-color: #DDAF34;
    }
    .freo-checkbox:checked::after {
      content: '';
      position: absolute;
      left: 4px;
      top: 1px;
      width: 5px;
      height: 9px;
      border: 2px solid #0A0A0A;
      border-top: none;
      border-left: none;
      transform: rotate(45deg);
    }
    .freo-checkbox:focus {
      outline: none;
      border-color: #DDAF34;
      box-shadow: 0 0 0 2px rgba(221,175,52,0.2);
    }
    .freo-checkbox:hover:not(:checked) {
      border-color: rgba(221,175,52,0.5);
    }

    /* ── Botão desabilitado ── */
    .btn-disabled {
      opacity: 0.35;
      cursor: not-allowed !important;
      pointer-events: none;
    }
    .btn-enabled {
      opacity: 1;
      cursor: pointer;
      pointer-events: auto;
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      20%       { transform: translateX(-6px); }
      40%       { transform: translateX(6px); }
      60%       { transform: translateX(-4px); }
      80%       { transform: translateX(4px); }
    }
    .shake { animation: shake 0.4s ease; }

    @keyframes pulse-border {
      0%, 100% { border-color: rgba(221,175,52,0.3); }
      50%       { border-color: #DDAF34; box-shadow: 0 0 0 3px rgba(221,175,52,0.25); }
    }
    .checkbox-alert { animation: pulse-border 0.5s ease 2; }
  </style>
</head>

<body class="bg-freo-black text-freo-light font-body antialiased min-h-screen flex items-center justify-center selection:bg-freo-orange selection:text-white px-4 py-10">

  <div class="relative w-full max-w-md bg-freo-dark border border-white/10 shadow-2xl overflow-hidden">
    <div class="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-freo-orange to-freo-cyan"></div>

    <div class="p-8">
      <div class="flex justify-center mb-8">
        <a href="/">
          <img
            src="https://rrmxqpvxrpcqqxsgccqw.supabase.co/storage/v1/object/public/imagens/logo.jpg"
            alt="Freo Figures Logo"
            class="w-16 h-16 rounded-full object-cover border-2 border-freo-orange shadow-[0_0_15px_rgba(221,175,52,0.3)]"
            onerror="this.style.display='none'"
          >
        </a>
      </div>

      <h2 class="text-3xl font-display font-black uppercase text-center mb-2 text-white">
        Criar Conta
      </h2>
      <p class="text-freo-light/60 text-center font-body text-sm mb-8">
        Junte-se à forja e acompanhe seus pedidos e projetos.
      </p>

      <div id="error-message" class="hidden bg-red-500/10 border border-red-500 text-red-500 p-4 text-center font-mono text-sm mb-6"></div>

      <div id="success-message" class="hidden bg-freo-cyan/10 border border-freo-cyan text-freo-cyan p-4 text-center font-mono text-sm mb-6">
        Conta criada com sucesso! Enviamos um link de confirmação para o seu e-mail. Verifique sua caixa de entrada e também o spam.
      </div>

      <form id="signup-form" class="space-y-4">
        <div>
          <label class="block text-xs font-mono text-freo-light/50 uppercase tracking-widest mb-2">Nome completo</label>
          <input
            type="text"
            id="name"
            required
            class="w-full bg-freo-black border border-white/10 text-white px-4 py-3 focus:outline-none focus:border-freo-orange transition-colors font-mono text-sm"
            placeholder="Seu nome"
          />
        </div>

        <div>
          <label class="block text-xs font-mono text-freo-light/50 uppercase tracking-widest mb-2">E-mail</label>
          <input
            type="email"
            id="email"
            required
            class="w-full bg-freo-black border border-white/10 text-white px-4 py-3 focus:outline-none focus:border-freo-orange transition-colors font-mono text-sm"
            placeholder="seu@email.com"
          />
        </div>

        <div>
          <label class="block text-xs font-mono text-freo-light/50 uppercase tracking-widest mb-2">Telefone / WhatsApp</label>
          <input
            type="tel"
            id="phone"
            required
            maxlength="15"
            oninput="maskPhone(this)"
            class="w-full bg-freo-black border border-white/10 text-white px-4 py-3 focus:outline-none focus:border-freo-orange transition-colors font-mono text-sm"
            placeholder="(11) 99999-9999"
          />
        </div>

        <div>
          <label class="block text-xs font-mono text-freo-light/50 uppercase tracking-widest mb-2">Senha</label>
          <input
            type="password"
            id="password"
            required
            class="w-full bg-freo-black border border-white/10 text-white px-4 py-3 focus:outline-none focus:border-freo-orange transition-colors font-mono text-sm"
            placeholder="••••••••"
          />
        </div>

        <!-- ── CHECKBOX DE ACEITE ── -->
        <div id="terms-wrapper" class="border border-white/8 bg-freo-black/40 p-4 mt-2">
          <label class="flex items-start gap-3 cursor-pointer group">
            <input
              type="checkbox"
              id="terms-checkbox"
              class="freo-checkbox mt-0.5"
            />
            <span class="text-xs font-mono text-freo-light/55 leading-relaxed group-hover:text-freo-light/75 transition-colors">
              Li e concordo com a
              <a href="/politicas.html" target="_blank" class="text-freo-orange hover:underline underline-offset-2">Política de Privacidade</a>,
              os
              <a href="/politicas.html" target="_blank" class="text-freo-orange hover:underline underline-offset-2">Termos de Uso</a>
              e a
              <a href="/politicas.html" target="_blank" class="text-freo-orange hover:underline underline-offset-2">Política de Trocas e Envio</a>
              da Freo Figures.
            </span>
          </label>
        </div>
        <!-- ── /CHECKBOX ── -->

        <button
          type="submit"
          id="submit-btn"
          class="w-full bg-freo-orange text-freo-black font-bold font-display uppercase tracking-widest py-4 hover:bg-white transition-colors mt-4 flex justify-center items-center btn-disabled"
        >
          Criar Conta
        </button>
      </form>

      <div class="mt-8 text-center">
        <a href="/login.html" class="text-freo-light/60 hover:text-freo-orange text-sm font-body transition-colors">
          Já tem uma conta? Faça login.
        </a>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const SUPABASE_URL = "https://rrmxqpvxrpcqqxsgccqw.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJybXhxcHZ4cnBjcXF4c2djY3F3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI1OTc5MjcsImV4cCI6MjA4ODE3MzkyN30.v4IoG2wln2-4T-DZ9CKdrftEu4oI6-bLfE8gRlWzDYM";

    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const form       = document.getElementById('signup-form');
    const errorDiv   = document.getElementById('error-message');
    const successDiv = document.getElementById('success-message');
    const submitBtn  = document.getElementById('submit-btn');
    const checkbox   = document.getElementById('terms-checkbox');
    const termsWrapper = document.getElementById('terms-wrapper');

    // ── Habilita/desabilita botão conforme checkbox ──
    checkbox.addEventListener('change', () => {
      if (checkbox.checked) {
        submitBtn.classList.remove('btn-disabled');
        submitBtn.classList.add('btn-enabled');
        termsWrapper.style.borderColor = 'rgba(221,175,52,0.3)';
      } else {
        submitBtn.classList.add('btn-disabled');
        submitBtn.classList.remove('btn-enabled');
        termsWrapper.style.borderColor = '';
      }
    });

    // ── Shake + pulso se tentar submeter sem aceitar ──
    function alertTerms() {
      termsWrapper.classList.remove('shake');
      checkbox.classList.remove('checkbox-alert');
      void termsWrapper.offsetWidth;
      termsWrapper.classList.add('shake');
      checkbox.classList.add('checkbox-alert');
      setTimeout(() => {
        termsWrapper.classList.remove('shake');
        checkbox.classList.remove('checkbox-alert');
      }, 1000);
    }

    // Intercepta clique direto no botão desabilitado (ex: via teclado)
    submitBtn.addEventListener('click', (e) => {
      if (!checkbox.checked) { e.preventDefault(); alertTerms(); }
    }, true);

    function maskPhone(input) {
      let v = input.value.replace(/\D/g, '').substring(0, 11);
      if (v.length > 6) {
        v = '(' + v.substring(0, 2) + ') ' + v.substring(2, 7) + '-' + v.substring(7);
      } else if (v.length > 2) {
        v = '(' + v.substring(0, 2) + ') ' + v.substring(2);
      }
      input.value = v;
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();

      // Guarda seguro
      if (!checkbox.checked) { alertTerms(); return; }

      errorDiv.classList.add('hidden');
      successDiv.classList.add('hidden');

      const name     = document.getElementById('name').value.trim();
      const email    = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const phoneRaw = document.getElementById('phone').value.trim();
      const phone    = phoneRaw.replace(/\D/g, '');

      if (!name || !email || !password || !phone) {
        errorDiv.innerText = 'Preencha todos os campos.';
        errorDiv.classList.remove('hidden');
        return;
      }

      if (phone.length < 10 || phone.length > 11) {
        errorDiv.innerText = 'Informe um telefone válido com DDD.';
        errorDiv.classList.remove('hidden');
        return;
      }

      if (!email.includes('@') || !email.includes('.')) {
        errorDiv.innerText = 'Por favor, insira um e-mail válido.';
        errorDiv.classList.remove('hidden');
        return;
      }

      if (password.length < 6) {
        errorDiv.innerText = 'A senha deve ter pelo menos 6 caracteres.';
        errorDiv.classList.remove('hidden');
        return;
      }

      submitBtn.innerHTML = '<div class="w-5 h-5 border-2 border-freo-black/30 border-t-freo-black rounded-full animate-spin"></div>';
      submitBtn.disabled = true;

      try {
        const { data, error } = await supabaseClient.auth.signUp({
          email,
          password,
          options: {
            redirectTo: 'https://freofigures.com.br/auth/callback.html',
            data: {
              full_name: name,
              name: name,
              phone: phone
            }
          }
        });

        if (error) throw error;

        successDiv.innerText = 'Conta criada com sucesso! Enviamos um link de confirmação para o seu e-mail. Verifique sua caixa de entrada e também o spam.';
        successDiv.classList.remove('hidden');
        form.classList.add('hidden');

        console.log('Cadastro realizado:', data);

        setTimeout(() => {
          window.location.href = '/login.html';
        }, 4000);

      } catch (err) {
        console.error('Erro real do cadastro:', err);
        errorDiv.innerText = err.message || 'Erro ao criar conta. Tente novamente.';
        errorDiv.classList.remove('hidden');
        submitBtn.innerHTML = 'Criar Conta';
        submitBtn.disabled = false;
      }
    });
  </script>
</body>
</html>
