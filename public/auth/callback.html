<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Confirmando seu email...</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800;900&family=Space+Grotesk:wght@300;400;600;700&display=swap" rel="stylesheet">
  
  <!-- Tailwind CSS via CDN para arquivo estático -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            'freo-black': '#0A0A0A',
            'freo-dark': '#121212',
            'freo-light': '#F5F5F5',
            'freo-orange': '#DDAF34', // Dourado Metálico
            'freo-cyan': '#2C3E50',   // Azul Ardósia
          },
          fontFamily: {
            display: ['Outfit', 'sans-serif'],
            body: ['Space Grotesk', 'sans-serif'],
            mono: ['ui-monospace', 'SFMono-Regular', 'Menlo', 'Monaco', 'Consolas', 'monospace'],
          }
        }
      }
    }
  </script>

  <!-- Supabase CDN -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/auth-listener.js"></script>
</head>
<body class="bg-freo-black text-freo-light font-body antialiased min-h-screen flex items-center justify-center selection:bg-freo-orange selection:text-white">
  
  <div class="relative w-full max-w-md bg-freo-dark border border-white/10 shadow-2xl overflow-hidden p-8 flex flex-col items-center text-center">
    <!-- Top accent line -->
    <div class="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-freo-orange to-freo-cyan"></div>
    
    <div class="flex justify-center mb-8">
      <img src="/logo.jpg" alt="Freo Figures Logo" class="w-16 h-16 rounded-full object-cover border-2 border-freo-orange shadow-[0_0_15px_rgba(221,175,52,0.3)]" onerror="this.style.display='none'">
    </div>

    <h2 class="text-3xl font-display font-black uppercase mb-4 text-white" id="status-title">
      Confirmando...
    </h2>
    
    <p class="text-freo-light/60 text-sm mb-8" id="status-message">
      Aguarde enquanto verificamos suas credenciais.
    </p>

    <!-- Spinner -->
    <div id="loading-spinner" class="w-12 h-12 border-4 border-freo-orange/30 border-t-freo-orange rounded-full animate-spin"></div>

    <!-- Success Message (Hidden by default) -->
    <div id="success-message" class="hidden bg-freo-orange/10 border border-freo-orange text-freo-orange p-4 text-center font-mono text-sm w-full">
      ✅ Email confirmado com sucesso! Redirecionando em 2 segundos...
    </div>
  </div>

  <script>
  const SUPABASE_URL = "https://rrmxqpvxrpcqqxsgccqw.supabase.co";
  const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJybXhxcHZ4cnBjcXF4c2djY3F3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI1OTc5MjcsImV4cCI6MjA4ODE3MzkyN30.v4IoG2wln2-4T-DZ9CKdrftEu4oI6-bLfE8gRlWzDYM";

  const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  function handleSuccess() {
    document.getElementById('status-title').innerText = "Sucesso!";
    document.getElementById('status-message').classList.add('hidden');
    document.getElementById('loading-spinner').classList.add('hidden');
    document.getElementById('success-message').classList.remove('hidden');

    setTimeout(() => {
      window.location.href = "/dashboard.html";
    }, 1500);
  }

  function handleError(message) {
    document.getElementById('status-title').innerText = "Erro";
    document.getElementById('status-message').innerText = message || "Não foi possível concluir a autenticação.";
    document.getElementById('loading-spinner').classList.add('hidden');
  }

  async function initCallback() {
    try {
      const url = new URL(window.location.href);
      const code = url.searchParams.get('code');

      if (code) {
        const { error } = await supabaseClient.auth.exchangeCodeForSession(code);
        if (error) throw error;
      }

      const { data: { session }, error } = await supabaseClient.auth.getSession();
      if (error) throw error;

      if (session) {
        handleSuccess();
      } else {
        handleError("Sessão não encontrada. Tente entrar novamente.");
      }
    } catch (err) {
      console.error("Erro no callback:", err);
      handleError(err.message);
    }
  }

  initCallback();
</script>
</body>
</html>
