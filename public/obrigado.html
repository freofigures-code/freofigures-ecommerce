  <script>
    // Trigger Confetti
    const duration = 3 * 1000;
    const animationEnd = Date.now() + duration;
    const defaults = { startVelocity: 30, spread: 360, ticks: 60, zIndex: 0, colors: ['#D4AF37', '#FFFFFF', '#121212'] };

    function randomInRange(min, max) {
      return Math.random() * (max - min) + min;
    }

    const interval = setInterval(function() {
      const timeLeft = animationEnd - Date.now();

      if (timeLeft <= 0) {
        return clearInterval(interval);
      }

      const particleCount = 50 * (timeLeft / duration);
      confetti(Object.assign({}, defaults, { particleCount, origin: { x: randomInRange(0.1, 0.3), y: Math.random() - 0.2 } }));
      confetti(Object.assign({}, defaults, { particleCount, origin: { x: randomInRange(0.7, 0.9), y: Math.random() - 0.2 } }));
    }, 250);

    function formatCurrency(v) {
      return new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' }).format(parseFloat(v) || 0);
    }

    async function carregarPedido() {
      const urlParams = new URLSearchParams(window.location.search);
      const paymentId = urlParams.get('payment_id');

      document.getElementById('order-number').innerText = paymentId ? '#' + paymentId : '#---';

      if (!paymentId) {
        document.getElementById('order-items').innerHTML =
          '<p class="text-sm text-freo-light/40">Detalhes do pedido enviados por e-mail.</p>';
        return;
      }

      const { data, error } = await window.supabaseClient
        .from('orders')
        .select('id, total, items, status')
        .eq('payment_id', paymentId)
        .single();

      if (error || !data) {
        document.getElementById('order-items').innerHTML =
          '<p class="text-sm text-freo-light/40">Detalhes do pedido enviados por e-mail.</p>';
        return;
      }

      document.getElementById('order-total').innerText = formatCurrency(data.total);

      const items = Array.isArray(data.items) ? data.items : [];

      if (items.length === 0) {
        document.getElementById('order-items').innerHTML =
          '<p class="text-sm text-freo-light/40">Detalhes do pedido enviados por e-mail.</p>';
        return;
      }

      document.getElementById('order-items').innerHTML = items.map(function(item) {
        const qty   = parseInt(item.quantity, 10) || 1;
        const price = parseFloat(item.price) || 0;
        return '<div class="flex justify-between items-center text-sm">'
          + '<span class="text-freo-light/80">' + qty + 'x ' + (item.product_name || 'Produto') + '</span>'
          + '<span class="font-mono text-freo-light/50">' + formatCurrency(price * qty) + '</span>'
          + '</div>';
      }).join('');

      // Envia evento de compra para o GTM
      window.dataLayer = window.dataLayer || [];
      window.dataLayer.push({ ecommerce: null });
      window.dataLayer.push({
        event: 'purchase',
        ecommerce: {
          transaction_id: String(paymentId),
          value: parseFloat(data.total) || 0,
          currency: 'BRL',
          items: items.map(function(item) {
            const qty   = parseInt(item.quantity, 10) || 1;
            const price = parseFloat(item.price) || 0;
            return {
              item_id:   String(item.product_id || item.id || ''),
              item_name: item.product_name || 'Produto',
              price:     price,
              quantity:  qty
            };
          })
        }
      });
    }

    document.addEventListener('DOMContentLoaded', carregarPedido);
  </script>
