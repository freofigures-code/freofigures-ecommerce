  <style>
    /* ── Custom checkbox ── */
    .freo-checkbox {
      appearance: none;
      -webkit-appearance: none;
      width: 18px;
      height: 18px;
      min-width: 18px;
      border: 1.5px solid rgba(255,255,255,0.2);
      background: #0A0A0A;
      cursor: pointer;
      position: relative;
      transition: border-color 0.2s, background 0.2s;
      display: inline-block;
      vertical-align: middle;
      flex-shrink: 0;
    }
    .freo-checkbox:checked {
      background: #DDAF34;
      border-color: #DDAF34;
    }
    .freo-checkbox:checked::after {
      content: '';
      position: absolute;
      left: 4px;
      top: 1px;
      width: 5px;
      height: 9px;
      border: 2px solid #0A0A0A;
      border-top: none;
      border-left: none;
      transform: rotate(45deg);
    }
    .freo-checkbox:focus {
      outline: none;
      border-color: #DDAF34;
      box-shadow: 0 0 0 2px rgba(221,175,52,0.2);
    }
    .freo-checkbox:hover:not(:checked) {
      border-color: rgba(221,175,52,0.5);
    }

    /* ── Botão desabilitado ── */
    .btn-disabled {
      opacity: 0.35;
      cursor: not-allowed !important;
      pointer-events: none;
    }
    .btn-enabled {
      opacity: 1;
      cursor: pointer;
      pointer-events: auto;
    }

    /* ── Shake animation para quando tenta submeter sem aceitar ── */
    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      20%       { transform: translateX(-6px); }
      40%       { transform: translateX(6px); }
      60%       { transform: translateX(-4px); }
      80%       { transform: translateX(4px); }
    }
    .shake { animation: shake 0.4s ease; }

    /* ── Highlight do checkbox quando alerta ── */
    @keyframes pulse-border {
      0%, 100% { border-color: rgba(221,175,52,0.3); }
      50%       { border-color: #DDAF34; box-shadow: 0 0 0 3px rgba(221,175,52,0.25); }
    }
    .checkbox-alert { animation: pulse-border 0.5s ease 2; }
  </style>

<body class="bg-freo-black text-freo-light font-body antialiased min-h-screen flex items-center justify-center selection:bg-freo-orange selection:text-white">

  <div class="relative w-full max-w-md bg-freo-dark border border-white/10 shadow-2xl overflow-hidden">

        <div class="flex justify-end">

        <svg class="w-5 h-5" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/><path d="M1 1h22v22H1z" fill="none"/></svg>
        Google

      <div class="mt-8 text-center">

  <script src="/auth-listener.js"></script>

  <script>
    // ── Mostra badge se tiver item pendente no carrinho ──
    (function() {
      try {
        const pending = localStorage.getItem('freo_pending_cart');
        if (pending) {
          const item = JSON.parse(pending);
          const badge = document.getElementById('pending-cart-badge');
          const nameEl = document.getElementById('pending-cart-name');
          if (badge && nameEl && item.title) {
            nameEl.textContent = item.title;
            badge.classList.remove('hidden');
          }
        }
      } catch (e) {}
    })();

    // ── Controle do checkbox de termos ──
    const checkbox    = document.getElementById('terms-checkbox');
    const submitBtn   = document.getElementById('submit-btn');
    const googleBtn   = document.getElementById('google-login-btn');
    const termsWrapper = document.getElementById('terms-wrapper');

    function toggleBtns(accepted) {
      if (accepted) {
        submitBtn.classList.remove('btn-disabled');
        submitBtn.classList.add('btn-enabled');
        googleBtn.classList.remove('btn-disabled');
        googleBtn.classList.add('btn-enabled');
        termsWrapper.style.borderColor = 'rgba(221,175,52,0.3)';
      } else {
        submitBtn.classList.add('btn-disabled');
        submitBtn.classList.remove('btn-enabled');
        googleBtn.classList.add('btn-disabled');
        googleBtn.classList.remove('btn-enabled');
        termsWrapper.style.borderColor = '';
      }
    }

    checkbox.addEventListener('change', () => toggleBtns(checkbox.checked));

    // Se clicar nos botões sem aceitar: shake + pisca o checkbox
    function alertTerms() {
      termsWrapper.classList.remove('shake');
      checkbox.classList.remove('checkbox-alert');
      void termsWrapper.offsetWidth; // reflow para reiniciar animação
      termsWrapper.classList.add('shake');
      checkbox.classList.add('checkbox-alert');
      setTimeout(() => {
        termsWrapper.classList.remove('shake');
        checkbox.classList.remove('checkbox-alert');
      }, 1000);
    }

    // Intercepta clique direto nos botões desabilitados
    submitBtn.addEventListener('click', (e) => {
      if (!checkbox.checked) { e.preventDefault(); alertTerms(); }
    }, true);
    googleBtn.addEventListener('click', (e) => {
      if (!checkbox.checked) { e.preventDefault(); alertTerms(); }
    }, true);

    // ── Função central: salvar item pendente no banco após login ──
    async function processarCarrinhoPendente(userId) {
      const pending = localStorage.getItem('freo_pending_cart');
      if (!pending) return false;
      try {
        const item = JSON.parse(pending);
        const { error } = await window.supabaseClient
          .from('cart_items')
          .insert({
            user_id: userId,
            product_id: String(item.id),
            product_name: item.title,
            quantity: 1,
            price: item.price,
            total_price: item.price,
            image_url: item.image,
            variant: null,
          });
        localStorage.removeItem('freo_pending_cart');
        if (error) { console.error('Erro ao salvar carrinho pendente:', error); return false; }
        localStorage.setItem('freo_open_cart', '1');
        return true;
      } catch (e) {
        console.error('Erro ao processar carrinho pendente:', e);
        localStorage.removeItem('freo_pending_cart');
        return false;
      }
    }

    // ── Login com Google ──
    async function loginComGoogle() {
      if (!checkbox.checked) { alertTerms(); return; }
      try {
        const { error } = await window.supabaseClient.auth.signInWithOAuth({
          provider: 'google',
          options: {
            redirectTo: 'https://freofigures.com.br/auth/callback.html',
            queryParams: { prompt: 'select_account' }
          }
        });
        if (error) throw error;
      } catch (err) {
        console.error('Erro no Google login:', err);
        alert('Erro ao conectar com Google: ' + err.message);
      }
    }

    document.addEventListener('DOMContentLoaded', () => {
      const botaoGoogle = document.getElementById('google-login-btn');
      if (botaoGoogle) {
        botaoGoogle.addEventListener('click', (e) => {
          e.preventDefault();
          e.stopPropagation();
          loginComGoogle();
        });
      }
    });

    // ── Login com e-mail/senha ──
    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();

      // Guarda seguro: se o botão estava desabilitado, não prossegue
      if (!checkbox.checked) { alertTerms(); return; }

      const email     = document.getElementById('email').value;
      const password  = document.getElementById('password').value;
      const errorDiv  = document.getElementById('error-message');

      errorDiv.classList.add('hidden');
      submitBtn.innerHTML = '<div class="w-5 h-5 border-2 border-freo-black/30 border-t-freo-black rounded-full animate-spin"></div>';
      submitBtn.disabled = true;

      try {
        const { data, error } = await window.supabaseClient.auth.signInWithPassword({ email, password });

        if (error) {
          const msg =
            error.message === 'Invalid login credentials' ? 'Email ou senha incorretos.' :
            error.message === 'Email not confirmed'       ? 'Por favor, confirme seu email antes de fazer login.' :
            error.message;

          errorDiv.innerText = msg;
          errorDiv.classList.remove('hidden');
          submitBtn.innerHTML = 'Entrar';
          submitBtn.disabled = false;
          return;
        }

        submitBtn.innerHTML = 'Salvando carrinho...';
        const temPendente = localStorage.getItem('freo_pending_cart');

        if (temPendente) {
          await processarCarrinhoPendente(data.user.id);
          window.location.href = '/?carrinho=1';
        } else {
          window.location.href = '/dashboard.html';
        }

      } catch (err) {
        console.error('Erro no login:', err);
        errorDiv.innerText = 'Erro de conexão. Tente novamente.';
        errorDiv.classList.remove('hidden');
        submitBtn.innerHTML = 'Entrar';
        submitBtn.disabled = false;
      }
    });
  </script>
