<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Checkout | FreoFigures</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800;900&family=Space+Grotesk:wght@300;400;600;700&display=swap" rel="stylesheet">
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            'freo-black': '#0A0A0A',
            'freo-dark': '#121212',
            'freo-light': '#F5F5F5',
            'freo-orange': '#D4AF37',
            'freo-cyan': '#2C3E50',
          },
          fontFamily: {
            display: ['Outfit', 'sans-serif'],
            body: ['Space Grotesk', 'sans-serif'],
            mono: ['ui-monospace', 'SFMono-Regular', 'Menlo', 'Monaco', 'Consolas', 'monospace'],
          }
        }
      }
    }
  </script>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const SUPABASE_URL = "https://rrmxqpvxrpcqqxsgccqw.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJybXhxcHZ4cnBjcXF4c2djY3F3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI1OTc5MjcsImV4cCI6MjA4ODE3MzkyN30.v4IoG2wln2-4T-DZ9CKdrftEu4oI6-bLfE8gRlWzDYM";
    window.supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
  </script>

  <script src="https://sdk.mercadopago.com/js/v2"></script>

  <style>
    .glass {
      background: rgba(18, 18, 18, 0.7);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.05);
    }
    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-track { background: #0A0A0A; }
    ::-webkit-scrollbar-thumb { background: #D4AF37; border-radius: 4px; }
    #paymentBrick_container { min-height: 500px; }
  </style>
</head>
<body class="bg-freo-black text-freo-light font-body antialiased min-h-screen flex flex-col selection:bg-freo-orange selection:text-white">

  <header class="glass sticky top-0 z-50 px-6 py-4 flex items-center justify-between border-b border-white/10">
    <div class="flex items-center gap-4 cursor-pointer" onclick="window.location.href='/dashboard.html'">
      <svg class="w-6 h-6 text-freo-light/60 hover:text-freo-orange transition-colors" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"/></svg>
      <h1 class="text-xl font-display font-bold uppercase tracking-widest text-white">Checkout Seguro</h1>
    </div>
    <div class="flex items-center gap-2 text-freo-orange">
      <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/></svg>
      <span class="font-mono text-xs uppercase tracking-widest hidden sm:inline">Ambiente Criptografado</span>
    </div>
  </header>

  <!-- Loading inicial -->
  <div id="page-loading" class="flex-1 flex items-center justify-center min-h-[60vh]">
    <div class="text-center">
      <div class="w-12 h-12 border-4 border-freo-orange border-t-transparent rounded-full animate-spin mx-auto mb-4"></div>
      <p class="font-mono text-sm text-freo-orange/60 uppercase tracking-widest">Carregando seu carrinho...</p>
    </div>
  </div>

  <!-- Carrinho vazio -->
  <div id="cart-empty-state" class="hidden flex-1 flex items-center justify-center min-h-[60vh]">
    <div class="text-center">
      <div class="text-6xl mb-4">🛒</div>
      <p class="font-display font-bold text-xl text-white/30 uppercase mb-4">Seu carrinho está vazio</p>
      <a href="/" class="inline-block bg-freo-orange text-freo-black font-display font-bold uppercase tracking-widest px-6 py-3 hover:bg-white transition-colors">
        Explorar catálogo
      </a>
    </div>
  </div>

  <main id="checkout-main" class="hidden flex-1 max-w-7xl w-full mx-auto p-6 grid grid-cols-1 lg:grid-cols-12 gap-8 mt-4">
    
    <!-- Resumo do Pedido -->
    <div class="lg:col-span-5 flex flex-col gap-6">
      <div class="glass p-8 rounded-2xl shadow-2xl">
        <h2 class="text-2xl font-display font-bold uppercase text-freo-orange mb-6 flex items-center gap-3">
          <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z"/></svg>
          Resumo do Pedido
        </h2>
        
        <div id="checkout-items" class="space-y-4 max-h-[400px] overflow-y-auto pr-2"></div>

        <div class="mt-8 pt-6 border-t border-white/10 space-y-3">
          <div class="flex justify-between text-sm font-mono text-freo-light/60">
            <span>Subtotal</span>
            <span id="summary-subtotal">R$ 0,00</span>
          </div>
          <div class="flex justify-between text-sm font-mono text-freo-light/60">
            <span>Frete</span>
            <span class="text-green-400">Grátis</span>
          </div>
          <div class="flex justify-between items-end pt-4 border-t border-white/10 mt-4">
            <span class="font-display font-bold uppercase text-lg text-white">Total Final</span>
            <span id="summary-total" class="font-mono font-bold text-3xl text-freo-orange">R$ 0,00</span>
          </div>
        </div>
      </div>
    </div>

    <!-- Pagamento -->
    <div class="lg:col-span-7">
      <div class="glass p-8 rounded-2xl shadow-2xl relative min-h-[500px]">
        <h2 class="text-2xl font-display font-bold uppercase text-white mb-6">Pagamento</h2>
        <div id="brick-loading" class="absolute inset-0 z-10 flex flex-col items-center justify-center bg-freo-dark/80 backdrop-blur-sm rounded-2xl">
          <div class="w-12 h-12 border-4 border-freo-orange border-t-transparent rounded-full animate-spin mb-4"></div>
          <p class="font-mono text-sm text-freo-orange uppercase tracking-widest animate-pulse">Preparando ambiente seguro...</p>
        </div>
        <div id="paymentBrick_container"></div>
      </div>
    </div>
  </main>

  <script src="/auth-listener.js"></script>

  <script>
    const MP_PUBLIC_KEY = 'APP_USR-7eb3299c-7dd3-4e5e-aaf0-c2ca09b1f5ad';
    const N8N_WEBHOOK_URL = 'https://n8nwebhook.solviaoficial.com/webhook/criar-pagamento';
    const backUrls = {
      success: "https://freofigures.com.br/obrigado.html",
      failure: "https://freofigures.com.br/erro-pagamento.html",
      pending: "https://freofigures.com.br/pendente.html"
    };

    var totalAmount = 0;
    var cartItemsData = [];
    var currentUser = null;

    const formatCurrency = (value) => new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' }).format(value);

    function showLoading()    { document.getElementById('page-loading').classList.remove('hidden'); document.getElementById('checkout-main').classList.add('hidden'); document.getElementById('cart-empty-state').classList.add('hidden'); }
    function showEmpty()      { document.getElementById('page-loading').classList.add('hidden'); document.getElementById('checkout-main').classList.add('hidden'); document.getElementById('cart-empty-state').classList.remove('hidden'); document.getElementById('cart-empty-state').classList.add('flex'); }
    function showCheckout()   { document.getElementById('page-loading').classList.add('hidden'); document.getElementById('checkout-main').classList.remove('hidden'); document.getElementById('cart-empty-state').classList.add('hidden'); }

    function renderSummary(items) {
      const container = document.getElementById('checkout-items');
      totalAmount = 0;
      container.innerHTML = items.map(item => {
        const price = parseFloat(item.price) || 0;
        const qty = item.quantity || 1;
        const subtotal = price * qty;
        totalAmount += subtotal;
        return `
          <div class="flex items-center gap-4 p-3 bg-white/5 rounded-lg border border-white/5">
            <div class="w-16 h-16 bg-freo-black rounded flex-shrink-0 overflow-hidden">
              ${item.image_url ? `<img src="${item.image_url}" class="w-full h-full object-cover" onerror="this.style.display='none'">` : '<div class="w-full h-full flex items-center justify-center text-white/20"><svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"/></svg></div>'}
            </div>
            <div class="flex-1 min-w-0">
              <h3 class="font-display font-bold text-sm text-white truncate">${item.product_name || item.name || 'Produto'}</h3>
              <p class="font-mono text-xs text-freo-light/50 mt-1">Qtd: ${qty} × ${formatCurrency(price)}</p>
            </div>
            <div class="text-right">
              <p class="font-mono font-bold text-freo-orange text-sm">${formatCurrency(subtotal)}</p>
            </div>
          </div>`;
      }).join('');
      document.getElementById('summary-subtotal').innerText = formatCurrency(totalAmount);
      document.getElementById('summary-total').innerText = formatCurrency(totalAmount);
    }

    async function notifyN8nOnLoad() {
      try {
        const response = await fetch(N8N_WEBHOOK_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            action: 'init_checkout',
            user_id: currentUser.id,
            user_email: currentUser.email,
            itens: cartItemsData,
            total: totalAmount,
            backUrls: backUrls
          })
        });
        return await response.json();
      } catch (err) {
        console.error("Erro ao notificar n8n:", err);
        return null;
      }
    }

    async function initPaymentBrick(preferenceId = null) {
      const mp = new MercadoPago(MP_PUBLIC_KEY, { locale: 'pt-BR' });
      const bricksBuilder = mp.bricks();
      const settings = {
        initialization: { amount: totalAmount, preferenceId: preferenceId || undefined },
        customization: {
          paymentMethods: { ticket: "all", bankTransfer: "all", creditCard: "all", debitCard: "all", mercadoPago: "all" },
          visual: {
            style: {
              theme: "dark",
              customVariables: {
                textPrimaryColor: "#F5F5F5", textSecondaryColor: "#D4AF37",
                baseColor: "#121212", backgroundColor: "#121212",
                outlinePrimaryColor: "#D4AF37", buttonTextColor: "#0A0A0A",
                buttonBackgroundColor: "#D4AF37",
              }
            }
          }
        },
        callbacks: {
          onReady: () => { document.getElementById('brick-loading').classList.add('hidden'); },
          onSubmit: ({ selectedPaymentMethod, formData }) => {
            const payload = { ...formData, action: 'process_payment', user_id: currentUser.id, backUrls };
            return new Promise((resolve, reject) => {
              fetch(N8N_WEBHOOK_URL, { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify(payload) })
                .then(r => r.json())
                .then(response => {
                  resolve(response);
                  if (response.status === 'approved') setTimeout(() => window.location.href = backUrls.success, 3000);
                  else if (response.status === 'rejected') setTimeout(() => window.location.href = backUrls.failure, 3000);
                })
                .catch(reject);
            });
          },
          onError: (error) => console.error("Erro no Payment Brick:", error),
        },
      };
      window.paymentBrickController = await bricksBuilder.create("payment", "paymentBrick_container", settings);
    }

    // ── FLUXO PRINCIPAL ────────────────────────────────────────────────────
    // Busca sessão e carrinho diretamente — não depende do auth-listener para funcionar
    async function initCheckout() {
      showLoading();

      try {
        // 1. Verifica sessão
        var sessionResult = await window.supabaseClient.auth.getSession();
        var session = sessionResult.data && sessionResult.data.session;

        if (!session) {
          window.location.href = '/login.html';
          return;
        }

        currentUser = session.user;

        // 2. Busca carrinho diretamente do banco
        var cartResult = await window.supabaseClient
          .from('cart_items')
          .select('*')
          .eq('user_id', currentUser.id);

        cartItemsData = cartResult.data || [];

        if (cartItemsData.length === 0) {
          showEmpty();
          return;
        }

        // 3. Mostra o checkout
        showCheckout();
        renderSummary(cartItemsData);

        // 4. Notifica n8n (opcional — não bloqueia se falhar)
        var n8nData = await notifyN8nOnLoad().catch(() => null);

        // 5. Inicializa o Mercado Pago Brick
        await initPaymentBrick(n8nData?.preferenceId);

      } catch (err) {
        console.error('Erro no checkout:', err);
        showEmpty();
      }
    }

    // Roda ao carregar a página
    document.addEventListener('DOMContentLoaded', initCheckout);

    // Fallback: também escuta o auth-listener caso ele dispare depois
    window.addEventListener('auth-not-logged-in', () => {
      window.location.href = '/login.html';
    });
  </script>
</body>
</html>
